[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
healthcheckInterval = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
restartPolicyMaxRetryDuration = 600

[env]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
