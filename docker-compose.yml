services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: circlex
      POSTGRES_PASSWORD: circlex
      POSTGRES_DB: circlex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U circlex -d circlex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://circlex:circlex@db:5432/circlex?sslmode=disable}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
